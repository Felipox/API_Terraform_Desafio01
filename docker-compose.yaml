services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel-app

    volumes:
      - .:/var/www

    networks:
      - laravel

  nginx:
    image: nginx:latest

    container_name: laravel-nginx

    ports:
      - "80:80"

    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - laravel

networks:
  laravel:
